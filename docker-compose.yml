services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_USER: flowforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge -d flowforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
